name: Run Outfitter Agent
description: >-
  Run an Outfitter agent headless in GitHub Actions to build scheduled
  reviewers, PR reviewers, issue triagers, or task agents.
author: ai-outfitter
branding:
  icon: compass
  color: orange

inputs:
  prompt:
    description: >-
      The prompt passed to the harness in print mode. The agent runs headless,
      does its work, prints its result, and exits. Optional when `inputs` is
      set; at least one of the two is required.
    required: false
    default: ""
  inputs:
    description: >-
      Structured inputs for the agent, as a YAML mapping of workflow-owned
      event identifiers (issue numbers, SHAs, repository names). Appended to
      the prompt as an `inputs:` block. Pass only trusted identifiers here —
      never issue/PR bodies or other user-influenced text.
    required: false
    default: ""
  agent:
    description: >-
      Agent slug to run (passed positionally as `outfitter run <agent>`).
      When empty, Outfitter falls back to the `default_agent` from the
      resolved settings layers (e.g. the checkout's `.agents/settings.yml`).
    required: false
    default: ""
  source:
    description: >-
      Optional `.agents` source to make the agent available. Accepts an
      `owner/repo` GitHub shorthand, any git-cloneable URI, or a path inside
      the checked-out repository (e.g. `${{ github.workspace }}` for a
      standalone `.agents` payload at the repository root).
    required: false
    default: ""
  source-ref:
    description: >-
      Optional tag, branch, or commit to pin a remote source to. Strongly
      recommended for sources you do not own — an unpinned source runs
      whatever the catalog publishes next.
    required: false
    default: ""
  harness:
    description: "Harness to launch: pi or claude."
    required: false
    default: pi
  github-token:
    description: >-
      Token exported as GH_TOKEN / GITHUB_TOKEN for the agent's `gh` and `git`
      calls. Defaults to the workflow's installation token; pass a fine-grained
      PAT from a dedicated machine account to have the agent comment, push, or
      open PRs under that account. See docs/token-permissions.md and
      docs/bot-account.md before widening this.
    required: false
    default: ${{ github.token }}
  git-user-name:
    description: Git author/committer name for any commits the agent makes.
    required: false
    default: ""
  git-user-email:
    description: Git author/committer email for any commits the agent makes.
    required: false
    default: ""
  outfitter-version:
    description: >-
      npm version range of @ai-outfitter/outfitter to install. Defaults to
      the newest 1.x release — the CLI surface this action targets — so a
      future outfitter major cannot break pinned workflows.
    required: false
    default: "^1.0.2"
  strict:
    description: Fail instead of warning when the adapter cannot project part of the composition.
    required: false
    default: "false"
  working-directory:
    description: Directory the agent runs in.
    required: false
    default: "."
  transcript-artifact:
    description: >-
      Name of the workflow artifact to save the agent's full session
      transcript to, as a self-contained HTML page (pi's native session
      export). Set to an empty string to disable. Currently pi-only; ignored
      for other harnesses. The artifact link is exposed as the
      `transcript-artifact-url` output so workflows can post it back to the
      issue or PR the agent worked on.
    required: false
    default: outfitter-transcript

outputs:
  transcript-artifact-url:
    description: >-
      URL of the uploaded transcript artifact, or empty when transcript
      saving is disabled, unsupported for the harness, or no session was
      written. Viewing requires being logged in to GitHub with access to
      the repository.
    value: ${{ steps.transcript-upload.outputs.artifact-url }}

runs:
  using: composite
  steps:
    - name: Install Outfitter
      shell: bash
      run: npm install -g "@ai-outfitter/outfitter@${{ inputs.outfitter-version }}"

    - name: Configure Outfitter settings
      shell: bash
      env:
        AGENT_SOURCE: ${{ inputs.source }}
        AGENT_SOURCE_REF: ${{ inputs.source-ref }}
      run: |
        # Classify the source: a directory in the checkout -> path,
        # a git URI -> uri, an owner/repo shorthand -> github.
        source_kind=""
        if [ -n "$AGENT_SOURCE" ]; then
          if [ -e "$AGENT_SOURCE" ] || [ -e "$GITHUB_WORKSPACE/$AGENT_SOURCE" ]; then
            source_kind="path"
          else
            case "$AGENT_SOURCE" in
              *://*|git+*) source_kind="uri" ;;
              */*) source_kind="github" ;;
              *)
                echo "source '$AGENT_SOURCE' is neither an existing path, a git URI, nor an owner/repo shorthand" >&2
                exit 1
                ;;
            esac
          fi
        fi

        if [ -n "$source_kind" ]; then
          mkdir -p "$HOME/.agents"
          {
            echo "sources:"
            if [ "$source_kind" = "path" ] && [ ! -e "$AGENT_SOURCE" ]; then
              echo "  - $source_kind: $GITHUB_WORKSPACE/$AGENT_SOURCE"
            else
              echo "  - $source_kind: $AGENT_SOURCE"
            fi
            if [ "$source_kind" != "path" ] && [ -n "$AGENT_SOURCE_REF" ]; then
              echo "    ref: $AGENT_SOURCE_REF"
            fi
          } > "$HOME/.agents/settings.yml"

          if [ "$source_kind" = "uri" ] || [ "$source_kind" = "github" ]; then
            outfitter sync
          fi
        fi

    - name: Configure git identity
      if: inputs.git-user-name != '' || inputs.git-user-email != ''
      shell: bash
      env:
        GIT_NAME: ${{ inputs.git-user-name }}
        GIT_EMAIL: ${{ inputs.git-user-email }}
      run: |
        if [ -n "$GIT_NAME" ]; then
          git config --global user.name "$GIT_NAME"
        fi
        if [ -n "$GIT_EMAIL" ]; then
          git config --global user.email "$GIT_EMAIL"
        fi

    - name: Run agent
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OUTFITTER_AGENT: ${{ inputs.agent }}
        OUTFITTER_HARNESS: ${{ inputs.harness }}
        OUTFITTER_PROMPT: ${{ inputs.prompt }}
        OUTFITTER_INPUTS: ${{ inputs.inputs }}
        OUTFITTER_STRICT: ${{ inputs.strict }}
        TRANSCRIPT_ARTIFACT: ${{ inputs.transcript-artifact }}
      run: |
        if [ -z "$OUTFITTER_PROMPT" ] && [ -z "$OUTFITTER_INPUTS" ]; then
          echo "At least one of 'prompt' or 'inputs' must be set." >&2
          exit 1
        fi

        prompt="$OUTFITTER_PROMPT"
        if [ -n "$OUTFITTER_INPUTS" ]; then
          if [ -z "$prompt" ]; then
            prompt="Handle this run following your agent instructions, using these structured inputs."
          fi
          prompt="$prompt

        inputs:
        $(printf '%s\n' "$OUTFITTER_INPUTS" | sed 's/^/  /')"
        fi

        run_args=(run)
        [ -n "$OUTFITTER_AGENT" ] && run_args+=("$OUTFITTER_AGENT")
        run_args+=(--harness "$OUTFITTER_HARNESS")
        [ "$OUTFITTER_STRICT" = "true" ] && run_args+=(--strict)

        harness_args=(-p "$prompt")
        # Pin the session to a known directory so the transcript steps can
        # find and export it. pi-only: other harnesses don't take --session-dir.
        if [ "$OUTFITTER_HARNESS" = "pi" ] && [ -n "$TRANSCRIPT_ARTIFACT" ]; then
          mkdir -p "$RUNNER_TEMP/outfitter-sessions"
          harness_args+=(--session-dir "$RUNNER_TEMP/outfitter-sessions")
        fi
        outfitter "${run_args[@]}" -- "${harness_args[@]}"

    # Export the session to self-contained HTML even when the agent step
    # failed — a transcript is most valuable for diagnosing a failed run.
    - name: Export session transcript
      id: transcript-export
      if: ${{ always() && inputs.harness == 'pi' && inputs.transcript-artifact != '' }}
      shell: bash
      run: |
        # Portable newest-file selection (xargs -r is GNU-only and fails on
        # macOS runners). Session paths contain no whitespace.
        newest=""
        for f in $(find "$RUNNER_TEMP/outfitter-sessions" -name '*.jsonl' -type f 2>/dev/null); do
          if [ -z "$newest" ] || [ "$f" -nt "$newest" ]; then
            newest="$f"
          fi
        done
        if [ -z "$newest" ]; then
          echo "No session file found under \$RUNNER_TEMP/outfitter-sessions; skipping transcript export." >&2
          echo "found=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # pi ships as a dependency of the globally installed outfitter; npm
        # does not link dependency bins onto PATH.
        pi_bin="$(npm root -g)/@ai-outfitter/outfitter/node_modules/.bin/pi"
        [ -x "$pi_bin" ] || pi_bin="$(command -v pi || true)"
        if [ -z "$pi_bin" ]; then
          echo "pi binary not found; skipping transcript export." >&2
          echo "found=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        mkdir -p "$RUNNER_TEMP/outfitter-transcript"
        (cd "$RUNNER_TEMP/outfitter-transcript" && "$pi_bin" --export "$newest")
        echo "found=true" >> "$GITHUB_OUTPUT"

    - name: Upload session transcript
      id: transcript-upload
      if: ${{ always() && steps.transcript-export.outputs.found == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.transcript-artifact }}
        path: ${{ runner.temp }}/outfitter-transcript/
        if-no-files-found: ignore
