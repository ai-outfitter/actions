# Triage every newly opened issue on GitHub Models — no API keys required.
# The agent classifies the issue, applies a label, and comments. Inference is
# authenticated by the workflow's own GITHUB_TOKEN via `models: read`; the
# provider config lives in the repo (.github/models.json) and is installed
# into pi's config dir before the action runs. See the README's
# "Using GitHub Models (no API keys)" section for the models.json contents.
#
# Setup: the labels your triage agent applies must already exist in the
# repository (`gh label create fix`, etc.) — the workflow token can add
# existing labels to issues but the agent should not be creating labels.
# Auth: workflow GITHUB_TOKEN — recommended for this shape (labels and comments
# in one repo, nothing that must trigger CI). See docs/token-permissions.md.
name: Issue triage
on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  models: read

jobs:
  triage:
    # Never triage issues the automation itself opened.
    if: github.event.issue.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Models provider for pi
        run: |
          mkdir -p "$HOME/.pi/agent"
          cp .github/models.json "$HOME/.pi/agent/models.json"

      - uses: ai-outfitter/actions@v1
        id: agent
        with:
          agent: issue-triage
          source: ai-outfitter/community-profiles
          source-ref: main # pin a tag/commit for catalogs you don't own
          # Pass the issue by number only; the agent fetches content with
          # `gh` so untrusted issue text never enters workflow code.
          prompt: >-
            Triage issue #${{ github.event.issue.number }} in
            ${{ github.repository }} following your process.

      # The action saved the agent's full session as a self-contained HTML
      # workflow artifact (input `transcript-artifact`, on by default).
      # Append the artifact link to the agent's own triage comment so the
      # decision trail is one click from the issue. Runs even when the agent
      # step failed — a transcript matters most then.
      - name: Link transcript on the triage comment
        if: ${{ !cancelled() && steps.agent.outputs.transcript-artifact-url != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          URL: ${{ steps.agent.outputs.transcript-artifact-url }}
        run: |
          comment_id="$(gh api "repos/$REPO/issues/$ISSUE/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]")] | last | .id // empty')"
          footer="$(printf '\n\n---\n<sub>🧾 <a href="%s">Full agent transcript</a> (workflow artifact; requires repo access)</sub>' "$URL")"
          if [ -n "$comment_id" ]; then
            gh api "repos/$REPO/issues/comments/$comment_id" --jq .body > /tmp/body.md
            # Idempotent on re-runs: keep the first transcript footer rather
            # than appending one per run.
            if grep -qF "Full agent transcript" /tmp/body.md; then
              echo "Transcript footer already present; skipping."
              exit 0
            fi
            printf '%s' "$footer" >> /tmp/body.md
            gh api -X PATCH "repos/$REPO/issues/comments/$comment_id" -F body=@/tmp/body.md > /dev/null
          else
            printf '%s' "$footer" | gh issue comment "$ISSUE" --repo "$REPO" --body-file -
          fi
