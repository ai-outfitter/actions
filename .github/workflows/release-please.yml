name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      # Marketplace consumers pin the floating major tag (e.g. `v1`);
      # release-please only creates the full semver tag, so move the
      # major tag ourselves on each release.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - name: Update major version tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          major="${TAG%%.*}"
          git fetch origin tag "$TAG" --no-tags
          git tag -f "$major" "$TAG"
          git push -f origin "$major"
