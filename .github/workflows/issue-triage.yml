# Triage every newly opened issue with the shared issue-triage profile from
# ai-outfitter/default-profiles: the agent classifies it as fix/feature/idea
# against this repo's CONTRIBUTING.md, applies that one label, and leaves a
# comment (or asks a team member to look when unclear).
#
# Inference runs on GitHub Models — no API keys. Authenticated by the
# workflow's own GITHUB_TOKEN via `models: read`; the provider config lives
# in .github/models.json. See examples/issue-triage-github-models.yml, which
# this workflow is the live copy of.
#
# Setup: the fix/feature/idea labels must already exist in the repository —
# the workflow token can add existing labels but the agent should not be
# creating labels.
# Auth: workflow GITHUB_TOKEN — recommended for this shape (labels and
# comments in one repo, nothing that must trigger CI).
name: Issue triage
on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  models: read

jobs:
  triage:
    # Never triage issues the automation itself opened.
    if: github.event.issue.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Models provider for pi
        run: |
          mkdir -p "$HOME/.pi/agent"
          cp .github/models.json "$HOME/.pi/agent/models.json"

      # This repository IS the action — dogfood the checked-out version so
      # a regression in action.yml surfaces here first.
      - uses: ./
        id: agent
        with:
          profile: issue-triage
          profile-source: ai-outfitter/default-profiles
          # Pinned commit; move to the first release tag once
          # default-profiles cuts v0.1.0.
          profile-source-ref: 6145a26a5debb537c1f34f7ab251bbf13c1d7802
          # Pass the issue by number only; the profile fetches content with
          # `gh` so untrusted issue text never enters workflow code.
          prompt: >-
            Triage issue #${{ github.event.issue.number }} in
            ${{ github.repository }} following your process.

      # The action saved the agent's full session as a self-contained HTML
      # workflow artifact. Append the artifact link to the agent's own triage
      # comment so the decision trail is one click from the issue. Runs even
      # when the agent step failed — a transcript matters most then.
      - name: Link transcript on the triage comment
        if: ${{ !cancelled() && steps.agent.outputs.transcript-artifact-url != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          URL: ${{ steps.agent.outputs.transcript-artifact-url }}
        run: |
          comment_id="$(gh api "repos/$REPO/issues/$ISSUE/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]")] | last | .id // empty')"
          footer="$(printf '\n\n---\n<sub>🧾 <a href="%s">Full agent transcript</a> (workflow artifact; requires repo access)</sub>' "$URL")"
          if [ -n "$comment_id" ]; then
            gh api "repos/$REPO/issues/comments/$comment_id" --jq .body > /tmp/body.md
            # Idempotent on re-runs: keep the first transcript footer rather
            # than appending one per run.
            if grep -qF "Full agent transcript" /tmp/body.md; then
              echo "Transcript footer already present; skipping."
              exit 0
            fi
            printf '%s' "$footer" >> /tmp/body.md
            gh api -X PATCH "repos/$REPO/issues/comments/$comment_id" -F body=@/tmp/body.md > /dev/null
          else
            printf '%s' "$footer" | gh issue comment "$ISSUE" --repo "$REPO" --body-file -
          fi

      # A green agent run is not proof of work — validate the side effects:
      # exactly one triage label (or the unclear-issue path) and a comment.
      # The script lives in this repo, so run it from the checkout.
      - name: Validate triage side effects
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/validate-triage.sh \
            --repo "${{ github.repository }}" \
            --issue "${{ github.event.issue.number }}" \
            --allow-unlabeled
